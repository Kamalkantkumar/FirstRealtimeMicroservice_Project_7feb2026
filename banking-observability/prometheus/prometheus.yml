global:
  scrape_interval: 5s

scrape_configs:

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: customer-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["customer-service:8080"]

  - job_name: loan-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["loan-service:8080"]
